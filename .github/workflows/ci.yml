name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref == 'refs/heads/main' && 'websites-deploy' || format('websites-{0}', github.ref) }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v4

      - name: Lint terraform
        run: terraform fmt -check -recursive infrastructure/terraform/

      # Deploy (main only)
      - uses: aws-actions/configure-aws-credentials@v6
        if: github.ref == 'refs/heads/main'
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - name: Terraform deploy
        if: github.ref == 'refs/heads/main'
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

  report:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
