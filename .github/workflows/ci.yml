name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: chris-arsenault/platform/.github/actions/governance-check@main
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install
      - name: Lint eslint
        run: pnpm exec eslint .

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { path: "apps/ahara.io", name: "ahara-frontend" }
          - { path: "apps/ahara.io/backend", name: "ahara-backend" }
    name: typecheck (${{ matrix.app.name }})
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install
      - name: Lint typecheck
        run: pnpm exec tsc --noEmit
        working-directory: ${{ matrix.app.path }}

  terraform-fmt:
    runs-on: ubuntu-latest
    name: terraform fmt
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Lint terraform
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

  sonarqube:
    runs-on: ubuntu-latest
    name: sonarqube
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/sonar-scan@main
        continue-on-error: true
        with:
          project-key: websites
          sources: apps,infrastructure/terraform
          exclusions: "**/node_modules/**,**/dist/**,**/.terraform/**"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [lint, typecheck, terraform-fmt]
    runs-on: ubuntu-latest
    concurrency:
      group: websites-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: hashicorp/setup-terraform@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - name: Build apps
        run: |
          for package_json in $(find apps -name package.json -not -path "*/node_modules/*" -not -path "*/dist/*"); do
            app_dir="$(dirname "${package_json}")"
            if node -e "const pkg=require('./${package_json}'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)"; then
              echo "Building ${app_dir}..."
              if [ -f "${app_dir}/package-lock.json" ]; then
                (cd "${app_dir}" && npm ci)
              else
                (cd "${app_dir}" && npm install)
              fi
              (cd "${app_dir}" && npm run build)
            fi
          done

      - name: Terraform deploy
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

  report:
    if: always()
    needs: [lint, typecheck, terraform-fmt, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
